<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Hawk Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>

:root{
--brand:#ff7a1a;
--brand2:#ff9b4a;
--bg:#0d0d0d;
--card:#111111;
--input:#181818;
--text:#ffffff;
--gray:#aaaaaa;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Montserrat',sans-serif;
background:var(--bg);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}

/* LOADER */

#page-loader{
position:fixed;
inset:0;
background:#0d0d0d;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999999;
transition:.5s;
}

.loader-logo{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
animation:pulse 1.5s infinite;
box-shadow:0 0 30px rgba(255,122,26,.4);
}

.loader-text{
margin-top:18px;
font-size:20px;
font-weight:bold;
letter-spacing:3px;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:1000;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(10px);
}

.logo-img{
height:38px;
border-radius:10px;
}

.header-icons{
display:flex;
gap:15px;
}

.header-icons a{
color:var(--brand);
font-size:20px;
}

/* SEARCH */

.search-area{
padding:15px;
}

.search-input{
width:100%;
height:52px;
border:none;
outline:none;
border-radius:18px;
padding:0 18px;
background:#151515;
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.05);
transition:.3s;
}

.search-input:focus{
border-color:var(--brand);
box-shadow:0 0 15px rgba(255,122,26,.15);
}

/* BANNER */

.promo-banner{
width:100%;
height:220px;
overflow:hidden;
position:relative;
}

.banner-track{
display:flex;
height:100%;
transition:.5s;
}

.banner-img{
min-width:100%;
height:100%;
object-fit:cover;
}

/* VIEWS */

.view-section{
display:none;
animation:fade .4s;
}

.view-section.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* CUSTOM DESIGN */

.custom-design-section{
padding:15px;
}

.upload-box{
background:#111;
border-radius:28px;
padding:20px;
border:1px solid rgba(255,122,26,.1);
}

.upload-border{
border:2px dashed rgba(255,122,26,.4);
border-radius:25px;
padding:40px 20px;
text-align:center;
}

.upload-icon{
font-size:65px;
color:var(--brand);
margin-bottom:15px;
}

.upload-border h3{
font-size:25px;
margin-bottom:10px;
}

.upload-border p{
color:#999;
margin-bottom:25px;
}

.upload-btn{
display:inline-block;
padding:14px 28px;
border-radius:15px;
background:linear-gradient(135deg,var(--brand),var(--brand2));
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.upload-btn:hover{
transform:scale(1.05);
}

#custom-upload{
display:none;
}

.design-notes{
background:#111;
margin-top:18px;
padding:20px;
border-radius:25px;
}

.design-notes h3{
margin-bottom:15px;
color:var(--brand);
}

.design-notes li{
margin-bottom:10px;
color:#ccc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:15px;
}

/* CARD */

.card{
background:#111;
border-radius:24px;
padding:12px;
position:relative;
overflow:hidden;
transition:.3s;
border:1px solid rgba(255,255,255,.05);
animation:cardIn .4s ease;
}

@keyframes cardIn{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

.card:hover{
transform:translateY(-5px);
border-color:rgba(255,122,26,.25);
}

.card::before{
content:'';
position:absolute;
top:0;
left:-120%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.08),
transparent
);
transition:.7s;
}

.card:hover::before{
left:120%;
}

.img-box{
height:150px;
background:#1a1a1a;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
}

.img-box img{
width:100%;
height:100%;
object-fit:contain;
transition:.4s;
}

.img-box:hover img{
transform:scale(1.08);
}

.card-title{
margin-top:12px;
font-weight:600;
font-size:15px;
}

.card-price{
margin-top:7px;
color:var(--brand);
font-weight:bold;
font-size:18px;
}

.fav-btn{
position:absolute;
top:15px;
right:15px;
font-size:23px;
cursor:pointer;
z-index:10;
transition:.3s;
}

.fav-btn:hover{
transform:scale(1.2);
}

/* DETAILS */

#details{
padding:15px;
}

.slider-container{
height:300px;
background:#111;
border-radius:25px;
overflow:hidden;
position:relative;
border:1px solid rgba(255,255,255,.05);
}

.slider-track{
display:flex;
height:100%;
transition:.5s;
}

.slide{
min-width:100%;
display:flex;
align-items:center;
justify-content:center;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
transition:.4s;
}

.slide img:hover{
transform:scale(1.05);
}

.slider-nav{
position:absolute;
top:50%;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 10px;
transform:translateY(-50%);
}

.arrow{
width:42px;
height:42px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.6);
color:var(--brand);
font-size:18px;
cursor:pointer;
}

.share-btn-float{
position:absolute;
top:15px;
left:15px;
width:42px;
height:42px;
border-radius:50%;
background:#111;
border:2px solid var(--brand);
display:flex;
align-items:center;
justify-content:center;
color:var(--brand);
font-size:18px;
z-index:10;
}

.color-dot{
width:32px;
height:32px;
border-radius:50%;
display:inline-block;
margin-right:10px;
cursor:pointer;
border:2px solid #333;
transition:.3s;
}

.color-dot.selected{
transform:scale(1.12);
border-color:var(--brand);
}

/* BUTTONS */

.btn-main{
width:100%;
border:none;
height:54px;
border-radius:16px;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.btn-main:hover{
transform:translateY(-2px);
}

.btn-white{
background:#eee;
color:#111;
}

.btn-brand{
background:linear-gradient(135deg,var(--brand),var(--brand2));
color:white;
}

/* CART */

#cart,
#favorites,
#checkout{
padding:15px;
}

.cart-card,
.fav-card{
background:#111;
border-radius:24px;
padding:12px;
display:flex;
align-items:center;
gap:12px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,.05);
animation:fade .3s;
}

.cart-img,
.fav-img{
width:90px;
height:90px;
border-radius:18px;
overflow:hidden;
background:#1a1a1a;
flex-shrink:0;
}

.cart-img img,
.fav-img img{
width:100%;
height:100%;
object-fit:cover;
}

.cart-info{
flex:1;
}

.cart-info h3{
margin-bottom:8px;
}

.cart-price{
color:var(--brand);
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
background:#1a1a1a;
padding:7px 10px;
border-radius:12px;
width:max-content;
}

.qty-box button{
width:28px;
height:28px;
border:none;
border-radius:8px;
background:var(--brand);
color:white;
cursor:pointer;
font-size:18px;
}

.delete-btn{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:#1a1a1a;
color:#ff4d4d;
font-size:18px;
cursor:pointer;
}

/* EMPTY */

.empty-box{
background:#111;
padding:40px 20px;
border-radius:24px;
text-align:center;
margin-top:20px;
}

.empty-box i{
font-size:55px;
margin-bottom:15px;
color:var(--brand);
}

.empty-box p{
margin-top:10px;
color:#999;
}

/* CHECKOUT */

.checkout-box{
display:flex;
flex-direction:column;
gap:15px;
}

.checkout-box input{
height:55px;
border:none;
outline:none;
background:#151515;
border-radius:16px;
padding:0 16px;
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.05);
}

.checkout-box input:focus{
border-color:var(--brand);
}

/* NAV */

nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:78px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.05);
border-radius:24px 24px 0 0;
z-index:1000;
}

.nav-btn{
flex:1;
text-align:center;
color:#777;
font-size:11px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
}

.nav-btn.active{
color:var(--brand);
font-weight:bold;
}

.nav-btn span{
font-size:22px;
margin-bottom:3px;
}

.cart-circle{
width:62px;
height:62px;
border-radius:50%;
background:linear-gradient(135deg,var(--brand),var(--brand2));
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
margin-top:-35px;
position:relative;
box-shadow:0 10px 20px rgba(255,122,26,.35);
border:none;
}

#cart-count{
position:absolute;
top:-5px;
right:-5px;
width:24px;
height:24px;
border-radius:50%;
background:red;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
}

/* TOAST */

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:14px 22px;
border-radius:15px;
display:none;
z-index:99999;
border:1px solid rgba(255,122,26,.2);
}

/* SCROLL */

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:var(--brand);
border-radius:20px;
}

</style>
</head>

<body>

<!-- LOADER -->

<div id="page-loader">

<img src="WhatsApp Image 2026-03-31 at 10.52.28 PM.jpeg" class="loader-logo">

<div class="loader-text">
HAWK STORE
</div>

</div>

<div class="toast" id="toast"></div>

<!-- HEADER -->

<header>

<img src="WhatsApp Image 2026-03-31 at 10.52.28 PM.jpeg" class="logo-img">

<div class="header-icons">

<a href="#">
<i class="fab fa-facebook-f"></i>
</a>

<a href="#">
<i class="fab fa-instagram"></i>
</a>

</div>

</header>

<!-- HOME -->

<div id="home" class="view-section active">

<div class="search-area">

<input
type="text"
class="search-input"
placeholder="Search products..."
oninput="searchProducts(this.value)"
>

</div>

<div class="promo-banner" onclick="nextBanner()">

<div class="banner-track" id="banner-track">

<img src="WhatsApp Image 2026-03-31 at 10.52.28 PM.jpeg" class="banner-img">

<img src="WhatsApp Image 2026-03-30 at 12.26.11 AM.jpeg" class="banner-img">

</div>

</div>

<!-- CUSTOM DESIGN -->

<section class="custom-design-section">

<div class="upload-box">

<div class="upload-border">

<i class="fas fa-image upload-icon"></i>

<h3>Upload Your Design</h3>

<p>PNG & JPG Supported</p>

<input type="file" id="custom-upload" accept="image/png,image/jpeg">

<label for="custom-upload" class="upload-btn">
Choose Image
</label>

<button
class="btn-main btn-brand"
style="margin-top:20px;"
onclick="customOrderMode=true;showView('checkout')"
>
Order Custom Design
</button>

</div>

</div>

<div class="design-notes">

<h3>Before Uploading</h3>

<ul>
<li>Use high quality image</li>
<li>Keep design centered</li>
<li>Vertical images work best</li>
<li>No blurry photos</li>
</ul>

</div>

</section>

<!-- PRODUCTS -->

<div class="grid" id="product-grid"></div>

</div>

<!-- DETAILS -->

<div id="details" class="view-section">

<button
class="btn-main btn-white"
style="margin-bottom:15px;"
onclick="showView('home')"
>
← Back
</button>

<div class="slider-container">

<div class="share-btn-float">
<i class="fas fa-share-alt"></i>
</div>

<div class="slider-nav">

<button class="arrow" onclick="changeSlide(-1)">
❮
</button>

<button class="arrow" onclick="changeSlide(1)">
❯
</button>

</div>

<div class="slider-track" id="slider-track"></div>

</div>

<h2 id="det-title" style="margin-top:18px;"></h2>

<h3 id="det-price" style="margin-top:10px;color:var(--brand);"></h3>

<div style="margin-top:20px;">

<div style="margin-bottom:10px;">
Color:
<span id="color-name"></span>
</div>

<div id="color-picker"></div>

</div>

<div style="display:flex;gap:10px;margin-top:25px;">

<button
class="btn-main btn-white"
onclick="addToCart()"
>
Add To Cart
</button>

<button
class="btn-main btn-brand"
onclick="showView('checkout')"
>
Order Now
</button>

</div>

</div>

<!-- FAVORITES -->

<div id="favorites" class="view-section">

<h2 style="margin-bottom:20px;">
Favorites ❤️
</h2>

<div id="fav-list"></div>

</div>

<!-- CART -->

<div id="cart" class="view-section">

<h2 style="margin-bottom:20px;">
Shopping Cart 🛒
</h2>

<div id="cart-list"></div>

<button
id="cart-order-btn"
class="btn-main btn-brand"
style="display:none;margin-top:15px;"
onclick="showView('checkout')"
>
Order Now
</button>

</div>

<!-- CHECKOUT -->

<div id="checkout" class="view-section">

<h2 style="margin-bottom:20px;">
Complete Your Order 🛍️
</h2>

<div class="checkout-box">

<input type="text" id="cust-name" placeholder="Full Name">

<input type="text" id="phone-type" placeholder="Phone Type">

<input type="text" id="confirm-phone-type" placeholder="Confirm Phone Type">

<input type="tel" id="cust-phone" placeholder="Phone Number">

<input type="tel" id="cust-phone2" placeholder="Confirm Phone Number">

<input type="text" id="cust-address" placeholder="Address">

<input type="text" id="cust-mark" placeholder="Nearest Landmark">

<input type="text" id="cust-apartment" placeholder="Apartment Number">

<button
class="btn-main btn-brand"
onclick="sendOrderToWhatsApp()"
>
Confirm Order
</button>

</div>

</div>

<!-- NAV -->

<nav>

<div class="nav-btn active" onclick="showView('home',this)">
<span>🏠</span>
Home
</div>

<div>

<button class="cart-circle" onclick="showView('cart',this)">

<i class="fas fa-shopping-cart"></i>

<div id="cart-count">
0
</div>

</button>

</div>

<div class="nav-btn" onclick="showView('favorites',this)">
<span>❤️</span>
Favs
</div>

</nav>

<script>

let customOrderMode = false;

const products = [

{
id:1,
name:"Hawk Classic T-shirt",
price:250,
variants:[
{
name:'White',
hex:'#ffffff',
images:[
'WhatsApp Image 2026-04-03 at 2.15.22 PM (1).jpeg',
'WhatsApp Image 2026-04-03 at 2.15.22 PM (2).jpeg'
]
}
]
},

{
id:2,
name:"Super Man T-shirt",
price:270,
variants:[
{
name:'Black',
hex:'#000000',
images:[
'WhatsApp Image 2026-04-10 at 2.15.41 PM.jpeg',
'WhatsApp Image 2026-04-03 at 2.15.20 PM.jpeg'
]
}
]
}

];

let cart = [];
let favorites = [];
let currentProduct = null;
let currentVariant = null;
let currentSlide = 0;

/* HOME */

function renderHome(data = products){

const grid = document.getElementById('product-grid');

grid.innerHTML = data.map(p => `

<div class="card">

<div class="fav-btn" onclick="toggleFav(${p.id})">
${favorites.includes(p.id) ? '❤️' : '🤍'}
</div>

<div class="img-box" onclick="openDetails(${p.id})">

<img src="${p.variants[0].images[0]}">

</div>

<div class="card-title">
${p.name}
</div>

<div class="card-price">
EGP ${p.price}
</div>

</div>

`).join('');

}

function searchProducts(q){

const filtered = products.filter(p =>
p.name.toLowerCase().includes(q.toLowerCase())
);

renderHome(filtered);

}

/* VIEWS */

function showView(id,btn){

document.querySelectorAll('.view-section').forEach(v=>{
v.classList.remove('active');
});

document.getElementById(id).classList.add('active');

if(btn){

document.querySelectorAll('.nav-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

}

if(id === "cart"){
renderCart();
}

if(id === "favorites"){
renderFavs();
}

window.scrollTo({
top:0,
behavior:'smooth'
});

}

/* DETAILS */

function openDetails(id){

currentProduct = products.find(p => p.id === id);

currentVariant = currentProduct.variants[0];

document.getElementById('det-title').innerText =
currentProduct.name;

document.getElementById('det-price').innerText =
`EGP ${currentProduct.price}`;

document.getElementById('color-name').innerText =
currentVariant.name;

document.getElementById('color-picker').innerHTML =
currentProduct.variants.map((v,i)=>

`<div
class="color-dot ${i==0?'selected':''}"
style="background:${v.hex}"
onclick="selectColor(${i},this)"
></div>`

).join('');

updateSlider();

showView('details');

}

function updateSlider(){

const track =
document.getElementById('slider-track');

track.innerHTML =
currentVariant.images.map(img =>

`<div class="slide">
<img src="${img}">
</div>`

).join('');

track.style.transform = `translateX(0%)`;

currentSlide = 0;

}

function changeSlide(dir){

const max = currentVariant.images.length;

currentSlide = (currentSlide + dir + max) % max;

document.getElementById('slider-track').style.transform =
`translateX(-${currentSlide * 100}%)`;

}

function selectColor(index,el){

currentVariant = currentProduct.variants[index];

document.getElementById('color-name').innerText =
currentVariant.name;

document.querySelectorAll('.color-dot').forEach(d=>{
d.classList.remove('selected');
});

el.classList.add('selected');

updateSlider();

}

/* CART */

function addToCart(){

const existing = cart.find(i =>
i.id === currentProduct.id
);

if(existing){

existing.qty += 1;

}else{

cart.push({
id:currentProduct.id,
name:currentProduct.name,
price:currentProduct.price,
img:currentVariant.images[0],
qty:1,
color:currentVariant.name
});

}

updateCartBadge();

showToast("Added To Cart 🛒");

}

function renderCart(){

const list = document.getElementById('cart-list');

const btn = document.getElementById('cart-order-btn');

if(cart.length === 0){

btn.style.display = "none";

list.innerHTML = `

<div class="empty-box">

<i class="fas fa-shopping-cart"></i>

<h3>Your Cart Is Empty</h3>

<p>Add products now 🛒</p>

</div>

`;

return;

}

btn.style.display = "block";

list.innerHTML = cart.map((item,index)=>`

<div class="cart-card">

<div class="cart-img">
<img src="${item.img}">
</div>

<div class="cart-info">

<h3>${item.name}</h3>

<div class="cart-price">
EGP ${item.price * item.qty}
</div>

<div class="qty-box">

<button onclick="changeQty(${index},-1)">
-
</button>

<span>${item.qty}</span>

<button onclick="changeQty(${index},1)">
+
</button>

</div>

</div>

<button
class="delete-btn"
onclick="removeCart(${index})"
>
<i class="fas fa-trash"></i>
</button>

</div>

`).join('');

}

function changeQty(index,change){

cart[index].qty += change;

if(cart[index].qty <= 0){
cart.splice(index,1);
}

renderCart();
updateCartBadge();

}

function removeCart(index){

cart.splice(index,1);

renderCart();
updateCartBadge();

showToast("Removed From Cart ❌");

}

function updateCartBadge(){

const total =
cart.reduce((sum,item)=>sum+item.qty,0);

document.getElementById('cart-count').innerText =
total;

}

/* FAVORITES */

function toggleFav(id){

if(favorites.includes(id)){

favorites = favorites.filter(f => f !== id);

}else{

favorites.push(id);

}

renderHome();

}

function renderFavs(){

const list =
document.getElementById('fav-list');

const favs =

function removeFav(id){

favorites = favorites.filter(f => f !== id);

renderFavs();
renderHome();

showToast("Removed From Favorites ❌");

}

/* TOAST */

function showToast(msg){

const toast =
document.getElementById('toast');

toast.innerText = msg;

toast.style.display = "block";

setTimeout(()=>{
toast.style.display = "none";
},2500);

}

/* BANNER */

let currentBanner = 0;

function nextBanner(){

const track =
document.getElementById('banner-track');

currentBanner = (currentBanner + 1) % 2;

track.style.transform =
`translateX(-${currentBanner * 100}%)`;

}

setInterval(nextBanner,4000);

/* NORMAL ORDER */

let orderItems =
cart.length > 0

: [{

}];

orderItems.reduce((sum,item)=>sum+item.qty,0);
